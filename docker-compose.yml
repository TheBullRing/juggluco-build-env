# docker-compose.yml
#
# Two profiles — pick one:
#
#   1. Clone mode (default):
#        docker compose up -d
#      Sources are baked into the image at build time.
#      Connect via SSH: ssh -p 2222 juggluco@localhost  (password: juggluco)
#
#   2. Volume mode (edit on host, build in container):
#      Set HOST_SRC to the absolute path of your local Juggluco clone, then:
#
#        # PowerShell (Windows):
#        $env:HOST_SRC = "C:\Users\you\Juggluco"
#        docker compose --profile volume up -d
#
#        # bash (Mac / Linux):
#        HOST_SRC=$HOME/Juggluco docker compose --profile volume up -d
#
#      Connect via SSH: ssh -p 2222 juggluco@localhost
#      Then build:      cd /workspace/Juggluco && ./gradlew assembleRelease
#
# Notes for Windows users:
#   - Files mounted from Windows appear as uid 0 inside the container.
#     The `juggluco` user has passwordless sudo, so prefix gradle with sudo:
#       sudo ./gradlew assembleMobileLibre3SiDexGoogleRelease
#   - CRLF line endings and gradlew execute bits are fixed automatically
#     by the entrypoint every time the container starts.

services:

  # ── clone mode (clones Juggluco on first start) ───────────────────────────
  juggluco-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: juggluco-build-env:latest
    profiles:
      - "!volume"   # only starts with plain `docker compose up`; excluded by --profile volume
    container_name: juggluco-dev
    ports:
      - "2222:22"
    working_dir: /workspace/Juggluco
    environment:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      GRADLE_USER_HOME: /home/juggluco/.gradle
    tty: true
    stdin_open: true

  # ── volume mode (live host folder) ────────────────────────────────────────
  juggluco-dev-volume:
    build:
      context: .
      dockerfile: Dockerfile
    image: juggluco-build-env:latest
    profiles:
      - volume
    container_name: juggluco-dev-volume
    ports:
      - "2222:22"
    working_dir: /workspace/Juggluco
    volumes:
      # HOST_SRC must be set to the absolute path of your local Juggluco clone.
      # Example (PowerShell):  $env:HOST_SRC = "C:\Users\you\Juggluco"
      # Example (bash):        export HOST_SRC=$HOME/Juggluco
      #
      # The default below is a placeholder so `docker compose build` (no profile)
      # does not fail on variable interpolation. It has no effect unless you start
      # the container with --profile volume AND HOST_SRC is unset.
      - "${HOST_SRC:-/tmp/juggluco-src-not-mounted}:/workspace/Juggluco"
    environment:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      GRADLE_USER_HOME: /home/juggluco/.gradle
    tty: true
    stdin_open: true
