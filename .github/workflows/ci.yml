name: Juggluco CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches:
      - main
      - master

# Cancel any in-progress run on the same branch/PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Check out this repo (build-env) ─────────────────────────────────
      - name: Checkout juggluco-build-env
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Cache Docker image layers ───────────────────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ── 4. Build the Docker image ──────────────────────────────────────────
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: juggluco-build-env:ci
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevent cache from growing unboundedly (move trick)
      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── 5. Prepare artifact output directory on the host ──────────────────
      - name: Prepare artifact output directory
        run: mkdir -p "${{ github.workspace }}/ci-artifacts"

      # ── 6. Run prerequisite validation inside the container ───────────────
      - name: Validate prerequisites
        run: |
          docker run --rm \
            -e ANDROID_HOME=/opt/android-sdk \
            -e WORKSPACE=/workspace/Juggluco \
            --user juggluco \
            --entrypoint /bin/bash \
            juggluco-build-env:ci \
            -c "
              ANDROID_HOME=/opt/android-sdk \
              WORKSPACE=/workspace/Juggluco \
              bash /workspace/juggluco-build-env/scripts/validate.sh
            "

      # ── 7. Build APK inside the container ─────────────────────────────────
      - name: Build Juggluco APK
        run: |
          docker run --rm \
            -e ANDROID_HOME=/opt/android-sdk \
            -e ANDROID_SDK_ROOT=/opt/android-sdk \
            -e GRADLE_USER_HOME=/home/juggluco/.gradle \
            -e WORKSPACE=/workspace/Juggluco \
            -e ARTIFACTS_DIR=/tmp/artifacts \
            -v "${{ github.workspace }}/ci-artifacts:/tmp/artifacts" \
            --user juggluco \
            --entrypoint /bin/bash \
            juggluco-build-env:ci \
            -c "
              set -e
              WORKSPACE=/workspace/Juggluco
              ARTIFACTS_DIR=/tmp/artifacts
              bash /workspace/juggluco-build-env/scripts/build.sh \
                MobileLibre3SiDexNogoogleRelease
            "

      # ── 8. Upload APK ──────────────────────────────────────────────────────
      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: juggluco-apk-${{ github.run_number }}
          path: ci-artifacts/*.apk
          if-no-files-found: warn
          retention-days: 14

      # ── 9. Upload build log ────────────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: ci-artifacts/build.log
          if-no-files-found: warn
          retention-days: 14
