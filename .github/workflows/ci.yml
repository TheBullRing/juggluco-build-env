name: Docker image build check

# This repo (juggluco-build-env) only owns the Docker build environment.
# Its sole CI responsibility is to verify that the Dockerfile builds successfully.
#
# The workflow that compiles the Juggluco APK lives in j-kaltes/Juggluco,
# not here. See docs/github-actions.md for the full two-repo architecture.

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

# Cancel any in-progress run on the same PR to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout juggluco-build-env
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          # Do not push — just verify the image builds without errors.
          push: false
          tags: juggluco-build-env:pr-check
