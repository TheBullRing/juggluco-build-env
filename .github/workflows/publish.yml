name: Publish Docker image

# Builds and pushes the juggluco-build-env image to GitHub Container Registry
# on every push to master (i.e. when a PR is merged).
# The published image is then pulled by the CI workflow in j-kaltes/Juggluco
# instead of being rebuilt from scratch on every PR.
#
# Image: ghcr.io/thebullring/juggluco-build-env:latest
#        ghcr.io/thebullring/juggluco-build-env:sha-<git-sha>

on:
  push:
    branches:
      - master
    paths:
      # Only rebuild when something that affects the image changes.
      - Dockerfile
      - entrypoint.sh
      - jniLibs.zip
      - patches/**
      - scripts/**

  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout juggluco-build-env
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/thebullring/juggluco-build-env:latest
            ghcr.io/thebullring/juggluco-build-env:sha-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
